<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>3D Gallery - Custom UI Edition</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: var(--text); }
        
        /* UI 层 */
        .nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 30px 40px; box-sizing: border-box; font-size: 11px; z-index: 100; font-weight: bold; pointer-events: none; }
        .footer { position: fixed; bottom: 40px; left: 40px; z-index: 100; pointer-events: none; }
        .title { font-size: clamp(40px, 8vw, 80px); font-weight: 900; margin: 0; letter-spacing: -3px; line-height: 0.8; text-transform: uppercase; }

        /* 3D 卡片 */
        .art-card {
            position: absolute; width: 220px; height: 330px; 
            cursor: pointer; z-index: 2;
            will-change: transform, width, height, left, top;
            transform-style: preserve-3d;
            transition: box-shadow 0.3s ease, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .art-card.is-flipped { transform: translate(-50%, -50%) rotateY(180deg) !important; z-index: 10000 !important; }
        .art-card.is-hovered:not(.is-flipped) { box-shadow: 0 30px 100px rgba(0,0,0,0.15); z-index: 1000 !important; }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            background: #fff; display: flex; flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        .card-back { 
            transform: rotateY(180deg); 
            padding: 25px; box-sizing: border-box; 
            justify-content: flex-start; align-items: flex-start;
            background: #ffffff;
        }
        .card-back .back-img-wrap { width: 100%; height: 50%; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .card-back img { width: 100%; height: 100%; object-fit: contain; }
        .card-back h2 { margin: 0 0 10px 0; font-size: 20px; font-weight: 900; line-height: 1.2; text-transform: uppercase; }
        .card-back p { margin: 0; font-size: 12px; line-height: 1.6; color: #555; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); opacity: 0; display: none; z-index: 5000;
            transition: opacity 0.5s;
        }
        body.is-detail #overlay { display: block; opacity: 0.98; }
    </style>
</head>
<body>

    <div class="nav">
        <span id="ui-label-left"></span>
        <span id="ui-count"></span>
        <span id="ui-label-right" style="pointer-events: auto; cursor: pointer;"></span>
    </div>

    <div class="footer"><h1 class="title" id="ui-main-title"></h1></div>
    
    <div id="overlay" onclick="exitDetail()"></div>
    <div id="canvas-container" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:1;"></div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        /* =========================================
           🛠️ 核心编辑区 - 所有的自定义都在这里
           =========================================
        */
        const CONFIG = {
            GUTTER: 2.8,           // 图片间距
            ZOOM: 1.15,            // 悬停缩放
            DETAIL_ZOOM: 2.8,      // 详情缩放
            SAFE_MARGIN: 60,       // 边缘安全距离
            CAMERA_Z: 15           // 相机深度（解决边缘偏移的关键）
        };

        // ✍️ UI 文本配置
        const TEXT_CONTENT = {
            MAIN_TITLE: "ART WORKS",    // 左下角大标题
            NAV_LEFT: "( GALLERY )",     // 导航左侧
            NAV_RIGHT: "( Jason )",      // 导航右侧
            COUNT_PREFIX: "( ",          // 数量前缀
            COUNT_SUFFIX: " WORKS )"     // 数量后缀
        };

        // 🖼️ 作品数据库
        const ART_DATA = {
            1: { title: "Echoes of Silence", desc: "作品 1 的详细介绍..." },
            2: { title: "Urban Structure", desc: "作品 2 的详细介绍..." },
            3: { title: "Natural Flow", desc: "作品 3 的详细介绍..." },
            4: { title: "Virtual Reality", desc: "作品 4 的详细介绍..." },
            5: { title: "Mystic Light", desc: "作品 5 的详细介绍..." },
            6: { title: "Desert Whisper", desc: "作品 6 的详细介绍..." },
            7: { title: "Beyond Bounds", desc: "作品 7 的详细介绍..." },
            8: { title: "Beyond Bounds", desc: "作品 8 的详细介绍..." },
            9: { title: "Beyond Bounds", desc: "作品 9 的详细介绍..." },
            10: { title: "Beyond Bounds", desc: "作品 10 的详细介绍..." }

        };

        /* =========================================
           🚀 逻辑处理
           =========================================
        */

        // 1. 初始化 UI 文本
        document.getElementById('ui-main-title').innerText = TEXT_CONTENT.MAIN_TITLE;
        document.getElementById('ui-label-left').innerText = TEXT_CONTENT.NAV_LEFT;
        document.getElementById('ui-label-right').innerText = TEXT_CONTENT.NAV_RIGHT;
        
        const count = Object.keys(ART_DATA).length;
        document.getElementById('ui-count').innerText = 
            `${TEXT_CONTENT.COUNT_PREFIX}${count}${TEXT_CONTENT.COUNT_SUFFIX}`;

        // 2. Three.js 基础设置
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = CONFIG.CAMERA_Z;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const cards = [];
        const mouse = new THREE.Vector2(-100, -100);
        const raycaster = new THREE.Raycaster();
        let isDetail = false;

        // 3. 生成作品卡片
        Object.keys(ART_DATA).forEach((id) => {
            const data = ART_DATA[id];
            const div = document.createElement('div');
            div.className = 'art-card';
            div.innerHTML = `
                <div class="card-face card-front"><img src="./${id}.jpg"></div>
                <div class="card-face card-back">
                    <div class="back-img-wrap"><img src="./${id}.jpg"></div>
                    <h2>${data.title}</h2>
                    <p>${data.desc}</p>
                </div>
            `;
            document.body.appendChild(div);
            
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(2.5, 3.5), 
                new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })
            );
            mesh.userData = { id: id, dom: div };
            scene.add(mesh);
            cards.push(mesh);

            div.onclick = () => {
                if(!isDetail) {
                    isDetail = true;
                    document.body.classList.add('is-detail');
                    div.classList.add('is-flipped');
                } else {
                    exitDetail();
                }
            };
        });

        window.exitDetail = () => {
            isDetail = false;
            document.body.classList.remove('is-detail');
            document.querySelectorAll('.is-flipped').forEach(el => el.classList.remove('is-flipped'));
        };

        let scrollPos = 0, targetScrollPos = 0;
        window.addEventListener('wheel', e => { if(!isDetail) targetScrollPos -= e.deltaY * 0.005; });
        window.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            scrollPos += (targetScrollPos - scrollPos) * 0.3;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cards);
            const hoveredMesh = (isDetail || intersects.length === 0) ? null : intersects[0].object;

            cards.forEach((m, i) => {
                const dom = m.userData.dom;
                const flipped = dom.classList.contains('is-flipped');

                let x = (i * CONFIG.GUTTER) + scrollPos;
                const totalW = count * CONFIG.GUTTER;
                x = ((x + totalW/2) % totalW + totalW) % totalW - totalW/2;
                m.position.x = x;

                const dist = Math.abs(x);
                const sf = Math.exp(-Math.pow(dist / 5, 2)); 
                const isHovered = (m === hoveredMesh);
                
                let targetScale = 0.5 + sf * 0.7;
                if (isHovered) targetScale *= CONFIG.ZOOM;
                if (flipped) targetScale = CONFIG.DETAIL_ZOOM;

                m.scale.setScalar(THREE.MathUtils.lerp(m.scale.x, targetScale, 0.15));
                m.position.z = sf * 2.5 + (isHovered ? 1.5 : 0) + (flipped ? 8 : 0);
                m.rotation.y = flipped ? 0 : x * -0.08;

                m.updateMatrixWorld();
                const vector = m.position.clone().project(camera);
                let xPos = (vector.x * .5 + .5) * window.innerWidth;
                let yPos = (-(vector.y * .5) + .5) * window.innerHeight;

                const currentW = 220 * m.scale.x;
                const currentH = currentW * 1.5;

                if (!flipped) {
                    const halfW = currentW / 2 + CONFIG.SAFE_MARGIN;
                    const halfH = currentH / 2 + CONFIG.SAFE_MARGIN;
                    if (xPos < halfW) xPos = halfW;
                    if (xPos > window.innerWidth - halfW) xPos = window.innerWidth - halfW;
                    if (yPos < halfH) yPos = halfH;
                    if (yPos > window.innerHeight - halfH) yPos = window.innerHeight - halfH;
                } else {
                    xPos = window.innerWidth / 2;
                    yPos = window.innerHeight / 2;
                }

                dom.style.width = `${currentW}px`;
                dom.style.height = `${currentH}px`;
                dom.style.left = `${xPos}px`; 
                dom.style.top = `${yPos}px`;
                
                const rotYDeg = flipped ? 180 : m.rotation.y * (180 / Math.PI);
                dom.style.transform = `translate(-50%, -50%) perspective(2000px) rotateY(${rotYDeg}deg)`;
                dom.style.zIndex = flipped ? "20000" : (isHovered ? "1000" : Math.floor(sf * 100));
            });

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
